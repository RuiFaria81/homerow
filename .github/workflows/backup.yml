name: Backup Operations

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Backup action"
        required: true
        type: choice
        options:
          - list
          - trigger
          - restore
      source:
        description: "Source for list/restore"
        required: false
        default: restic
        type: choice
        options:
          - restic
          - local
      target:
        description: "Target for trigger"
        required: false
        default: all
        type: choice
        options:
          - all
          - postgres
          - restic
      restic_snapshot:
        description: "Restic snapshot id for restore"
        required: false
        default: latest
        type: string
      snapshot:
        description: "Postgres snapshot timestamp for restore"
        required: false
        default: latest
        type: string
      no_restart:
        description: "Do not restart services after restore"
        required: false
        default: false
        type: boolean
      assume_yes:
        description: "Skip destructive restore confirmation"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Generate config.env from secrets
        shell: bash
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          EMAIL: ${{ secrets.EMAIL }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          ACME_ENV: ${{ secrets.ACME_ENV }}
          VPS_STACK: ${{ secrets.VPS_STACK }}
          DNS_STACK: ${{ secrets.DNS_STACK }}
          STORAGE_STACK: ${{ secrets.STORAGE_STACK }}
          HETZNER_SERVER_TYPE: ${{ secrets.HETZNER_SERVER_TYPE }}
          HETZNER_LOCATION: ${{ secrets.HETZNER_LOCATION }}
          HETZNER_REUSE_EXISTING_SERVER: ${{ secrets.HETZNER_REUSE_EXISTING_SERVER }}
          HETZNER_OBJECT_STORAGE_LOCATION: ${{ secrets.HETZNER_OBJECT_STORAGE_LOCATION }}
          WEBMAIL_SUBDOMAIN: ${{ secrets.WEBMAIL_SUBDOMAIN }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_PREFIX: ${{ secrets.TF_STATE_PREFIX }}
        run: |
          cat > config.env <<EOF_CONFIG
          DOMAIN=${DOMAIN}
          EMAIL=${EMAIL}
          MAIL_PASSWORD=${MAIL_PASSWORD}
          RESTIC_PASSWORD=${RESTIC_PASSWORD}
          HCLOUD_TOKEN=${HCLOUD_TOKEN}
          CLOUDFLARE_TOKEN=${CLOUDFLARE_TOKEN}
          CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
          S3_ACCESS_KEY=${S3_ACCESS_KEY}
          S3_SECRET_KEY=${S3_SECRET_KEY}
          ACME_ENV=${ACME_ENV:-production}
          VPS_STACK=${VPS_STACK:-hetzner}
          DNS_STACK=${DNS_STACK:-cloudflare}
          STORAGE_STACK=${STORAGE_STACK:-hetzner-object-storage}
          HETZNER_SERVER_TYPE=${HETZNER_SERVER_TYPE:-cx23}
          HETZNER_LOCATION=${HETZNER_LOCATION:-nbg1}
          HETZNER_REUSE_EXISTING_SERVER=${HETZNER_REUSE_EXISTING_SERVER:-true}
          HETZNER_OBJECT_STORAGE_LOCATION=${HETZNER_OBJECT_STORAGE_LOCATION:-nbg1}
          WEBMAIL_SUBDOMAIN=${WEBMAIL_SUBDOMAIN:-webmail}
          TF_STATE_BUCKET_NAME=${TF_STATE_BUCKET_NAME}
          TF_STATE_PREFIX=${TF_STATE_PREFIX}
          EOF_CONFIG

      - name: Run backup action
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ACTION='${{ github.event.inputs.action }}'
          SOURCE='${{ github.event.inputs.source }}'
          TARGET='${{ github.event.inputs.target }}'
          RESTIC_SNAPSHOT='${{ github.event.inputs.restic_snapshot }}'
          SNAPSHOT='${{ github.event.inputs.snapshot }}'
          NO_RESTART='${{ github.event.inputs.no_restart }}'
          ASSUME_YES='${{ github.event.inputs.assume_yes }}'

          cmd=(./hrow backup --via local "${ACTION}")
          case "${ACTION}" in
            list)
              cmd+=(--source "${SOURCE}")
              ;;
            trigger)
              cmd+=(--target "${TARGET}")
              ;;
            restore)
              cmd+=(--source "${SOURCE}" --restic-snapshot "${RESTIC_SNAPSHOT}" --snapshot "${SNAPSHOT}")
              if [[ "${NO_RESTART}" == "true" ]]; then
                cmd+=(--no-restart)
              fi
              if [[ "${ASSUME_YES}" == "true" ]]; then
                cmd+=(--yes)
              fi
              ;;
            *)
              echo "Unsupported backup action: ${ACTION}" >&2
              exit 1
              ;;
          esac

          "${cmd[@]}"
