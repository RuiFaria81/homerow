name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "webmail/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'guilhermeprokisch/homerow'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install webmail dependencies
        working-directory: webmail
        run: npm ci

      - name: Build static webmail demo
        working-directory: webmail
        run: npm run build:demo-static

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Verify static demo assets
        working-directory: docs
        run: npm run test:webmail-demo-static

      - name: Build site
        working-directory: docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    if: github.repository == 'guilhermeprokisch/homerow'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
