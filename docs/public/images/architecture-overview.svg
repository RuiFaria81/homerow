<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Homerow architecture layers</title>
  <desc id="archDesc">A layered diagram mapping infrastructure, NixOS services, sync engine, webmail, and deployment orchestration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fcfb"/>
      <stop offset="100%" stop-color="#e4f3f0"/>
    </linearGradient>
    <filter id="layerShadow" x="-10%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#0b4f46" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <image href="/logo.svg" x="95" y="72" width="100" height="98"/>
  <text x="220" y="132" fill="#0a433c" font-size="58" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">System Architecture</text>
  <text x="220" y="176" fill="#2a7068" font-size="30" font-family="'Avenir Next', 'Segoe UI', sans-serif">How Homerow components connect from infrastructure to user workflows.</text>

  <g transform="translate(180 240)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="1240" height="110" rx="22" fill="#0f665c"/>
    <text x="50" y="68" fill="#ecf9f7" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">1. Infrastructure (Terraform)</text>
    <text x="650" y="68" fill="#d8f0eb" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif">Hetzner VPS, Cloudflare DNS, S3 backups</text>
  </g>

  <g transform="translate(180 385)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="1240" height="110" rx="22" fill="#0c574f"/>
    <text x="50" y="68" fill="#ecf9f7" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">2. NixOS Services</text>
    <text x="650" y="68" fill="#d8f0eb" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif">Postfix, Dovecot, Rspamd, nginx, TLS</text>
  </g>

  <g transform="translate(180 530)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="1240" height="110" rx="22" fill="#094940"/>
    <text x="50" y="68" fill="#ecf9f7" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">3. Sync Engine</text>
    <text x="650" y="68" fill="#d8f0eb" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif">IMAP sync, indexing, PostgreSQL writes</text>
  </g>

  <g transform="translate(180 675)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="1240" height="110" rx="22" fill="#073c35"/>
    <text x="50" y="68" fill="#ecf9f7" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">4. Webmail Application</text>
    <text x="650" y="68" fill="#d8f0eb" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif">Threaded UI, compose, auth, search</text>
  </g>

  <g transform="translate(180 820)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="1240" height="110" rx="22" fill="#052f2a"/>
    <text x="50" y="68" fill="#ecf9f7" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">5. Deploy Orchestration</text>
    <text x="650" y="68" fill="#d8f0eb" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif">One-command install and repeatable updates</text>
  </g>

  <path d="M800 352 V380" stroke="#0f665c" stroke-width="10" stroke-linecap="round"/>
  <path d="M800 497 V525" stroke="#0f665c" stroke-width="10" stroke-linecap="round"/>
  <path d="M800 642 V670" stroke="#0f665c" stroke-width="10" stroke-linecap="round"/>
  <path d="M800 787 V815" stroke="#0f665c" stroke-width="10" stroke-linecap="round"/>
</svg>
