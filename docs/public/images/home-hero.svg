<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Homerow documentation hero graphic</title>
  <desc id="heroDesc">A branded hero with the Homerow logo and highlights for deploy, operate, and backup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbfa"/>
      <stop offset="100%" stop-color="#e0f2ef"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f665c"/>
      <stop offset="100%" stop-color="#0a433c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#07342f" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="120" r="180" fill="#c6e8e2" opacity="0.6"/>
  <circle cx="150" cy="780" r="240" fill="#d8efeb" opacity="0.8"/>

  <g transform="translate(110 150)">
    <text x="0" y="0" fill="#0a433c" font-size="70" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">
      Homerow Email Docs
    </text>
    <text x="0" y="72" fill="#195f57" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif">
      Self-host your full mail stack with reproducible infrastructure.
    </text>

    <g transform="translate(0 140)">
      <rect x="0" y="0" width="240" height="66" rx="33" fill="#0f665c"/>
      <text x="120" y="42" text-anchor="middle" fill="#ffffff" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="600">Deploy</text>

      <rect x="270" y="0" width="240" height="66" rx="33" fill="#0f665c"/>
      <text x="390" y="42" text-anchor="middle" fill="#ffffff" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="600">Operate</text>

      <rect x="540" y="0" width="240" height="66" rx="33" fill="#0f665c"/>
      <text x="660" y="42" text-anchor="middle" fill="#ffffff" font-size="28" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="600">Back Up</text>
    </g>
  </g>

  <g transform="translate(930 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="560" height="640" rx="34" fill="url(#card)"/>
    <rect x="46" y="46" width="468" height="106" rx="20" fill="#2f8f84" opacity="0.38"/>
    <rect x="46" y="176" width="468" height="300" rx="24" fill="#ffffff" opacity="0.15"/>
    <rect x="46" y="500" width="220" height="94" rx="20" fill="#ffffff" opacity="0.2"/>
    <rect x="294" y="500" width="220" height="94" rx="20" fill="#ffffff" opacity="0.2"/>

    <image href="/logo.svg" x="118" y="188" width="324" height="318"/>

    <text x="280" y="108" text-anchor="middle" fill="#eaf8f5" font-size="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">Homerow Email</text>
    <text x="156" y="557" text-anchor="middle" fill="#f3fcfb" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">NixOS</text>
    <text x="404" y="557" text-anchor="middle" fill="#f3fcfb" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">Webmail</text>
  </g>
</svg>
