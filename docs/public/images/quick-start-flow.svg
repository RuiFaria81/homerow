<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="flowTitle flowDesc">
  <title id="flowTitle">Quick start deployment flow</title>
  <desc id="flowDesc">A three-step quick start diagram showing configure, deploy, and verify with Homerow branding.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf8f6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="130%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0c4f47" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="680" fill="#f5fbfa"/>
  <rect x="70" y="54" width="1460" height="572" rx="36" fill="url(#surface)"/>

  <g transform="translate(120 90)">
    <image href="/logo.svg" x="0" y="0" width="96" height="94"/>
    <text x="120" y="58" fill="#0a433c" font-size="46" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">Quick Start at a Glance</text>
    <text x="120" y="96" fill="#2b746b" font-size="26" font-family="'Avenir Next', 'Segoe UI', sans-serif">Configuration to production in one reproducible flow.</text>
  </g>

  <g transform="translate(130 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="280" rx="30" fill="#0f665c"/>
    <circle cx="62" cy="58" r="30" fill="#e2f3f1"/>
    <text x="62" y="68" text-anchor="middle" fill="#0f665c" font-size="30" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">1</text>
    <text x="120" y="70" fill="#f4fcfb" font-size="36" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">Configure</text>
    <text x="44" y="126" fill="#e7f7f4" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">Set domain, DNS provider, and</text>
    <text x="44" y="164" fill="#e7f7f4" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">credentials in config.env.</text>
  </g>

  <g transform="translate(600 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="280" rx="30" fill="#0c534b"/>
    <circle cx="62" cy="58" r="30" fill="#d8efeb"/>
    <text x="62" y="68" text-anchor="middle" fill="#0f665c" font-size="30" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">2</text>
    <text x="120" y="70" fill="#f4fcfb" font-size="36" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">Deploy</text>
    <text x="44" y="126" fill="#e7f7f4" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">Run your preferred deploy path</text>
    <text x="44" y="164" fill="#e7f7f4" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">(GitHub Actions, Docker, or Nix).</text>
  </g>

  <g transform="translate(1070 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="280" rx="30" fill="#083f38"/>
    <circle cx="62" cy="58" r="30" fill="#cde8e3"/>
    <text x="62" y="68" text-anchor="middle" fill="#0f665c" font-size="30" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">3</text>
    <text x="120" y="70" fill="#f4fcfb" font-size="36" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-weight="700">Verify</text>
    <text x="44" y="126" fill="#e7f7f4" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">Open webmail, test IMAP/SMTP,</text>
    <text x="44" y="164" fill="#e7f7f4" font-size="25" font-family="'Avenir Next', 'Segoe UI', sans-serif">and confirm backups are active.</text>
  </g>

  <path d="M550 382 H585" stroke="#0f665c" stroke-width="12" stroke-linecap="round"/>
  <path d="M1020 382 H1055" stroke="#0f665c" stroke-width="12" stroke-linecap="round"/>
</svg>
